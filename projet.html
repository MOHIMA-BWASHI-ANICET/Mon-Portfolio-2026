<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Portfolio - Anicet Mohima</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- LIAISON CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>
<section class="section">
    <h2>Mes Projets</h2>
    <div class="line"></div>
</section>

<div class="grid" id="projects"></div>

<button class="btn">Voir plus</button>

<footer>
    <p>© 2026 Anicet Mohima Bwashi</p>
    <div class="icons">
        <span>🌐</span>
        <span>💼</span>
        <span>📧</span>
        <a href="#">linkedIn</a>
        <a href="#">X</a>
    </div>
</footer>

<script>

/* PROJETS */
const projects = [
    "E-commerce",
    "Gestionnaire",
    "Blog",
    "Dashboard",
    "Météo",
    "UI Design"
];

const container = document.getElementById("projects");

/* CREATION DES CARTES */
projects.forEach((title, index) => {

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
        <img src="https://picsum.photos/400/200?random=${index}">
        <div class="card-content">
            <h3>${title}</h3>
            <p>Projet moderne développé avec différentes technologies.</p>
            <div class="tags">
                <span>Web</span>
                <span>Dev</span>
            </div>
            <div class="links">
                <a href="#">Code</a>
                <a href="#">Démo</a>
            </div>
        </div>
    `;

    container.appendChild(card);
});

/* ANIMATION SCROLL */
const cards = document.querySelectorAll(".card");

window.addEventListener("scroll", () => {
    cards.forEach(card => {
        const position = card.getBoundingClientRect().top;
        const screen = window.innerHeight;

        if(position < screen - 100){
            card.classList.add("show");
        }
    });
});
</script>

</body>
</html>
